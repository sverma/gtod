name: worlddatetime-ci-cd

on:

  push:
    branches:
      - main

  pull_request:

permissions:
  contents: read
  id-token: write
  security-events: write

env:

  IMAGE_NAME: worlddatetime

jobs:

  lint-test-security:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Go Mod Download
        run: go mod download

      - name: GoFmt
        run: |
          test -z "$(gofmt -l .)"

      - name: Go Vet
        run: go vet ./...

      - name: Run Tests
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

      - name: Run golangci-lint
        run: golangci-lint run ./...

      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@v1

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1

  build-sign-push:

    needs:
      - lint-test-security

    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate To GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider:
            ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}

          service_account:
            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Auth
        run: |
          gcloud auth configure-docker \
          ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Generate Image Tag
        id: meta
        run: |
          echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Image
        run: |
          docker build \
          -t \
          ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/worlddatetime:${{ steps.meta.outputs.image_tag }} \
          .

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/worlddatetime:${{ steps.meta.outputs.image_tag }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/worlddatetime:${{ steps.meta.outputs.image_tag }}

      - name: Push Image
        run: |
          docker push \
          ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/worlddatetime:${{ steps.meta.outputs.image_tag }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign Sign Image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
          ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/worlddatetime:${{ steps.meta.outputs.image_tag }}

  deploy-staging:

    needs:
      - build-sign-push

    runs-on: ubuntu-latest

    environment:
      name: staging

    steps:

      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}

      - name: Update Staging Image Tag
        run: |

          cd applications/stage/worlddatetime

          sed -i \
          "s/newTag:.*/newTag: ${{
          needs.z }}/" \
          kustomization.yaml

      - name: Commit And Push
        run: |

          git config user.name github-actions
          git config user.email actions@github.com

          git add .

          git commit -m \
          "Deploy staging worlddatetime ${{
          needs.build-sign-push.outputs.image_tag }}"

          git push

  deploy-production:

    needs:
      - deploy-staging

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}

      - name: Update Production Image Tag
        run: |

          cd applications/production/worlddatetime

          sed -i \
          "s/newTag:.*/newTag: ${{
          needs.build-sign-push.outputs.image_tag }}/" \
          kustomization.yaml

      - name: Commit And Push
        run: |

          git config user.name github-actions
          git config user.email actions@github.com

          git add .

          git commit -m \
          "Deploy production worlddatetime ${{
          needs.build-sign-push.outputs.image_tag }}"

          git push

